{% extends 'base.html' %}

{% block content %}

<div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow text-center">

    <h2 class="text-xl font-bold text-red-600 mb-4">
        ⚠ Delete Module
    </h2>

    <p class="text-gray-700 mb-6">
        Are you sure you want to delete
        <span class="font-semibold">{{ object.code }} - {{ object.title }}</span>?
    </p>

    <p class="text-sm text-gray-500 mb-6">
        This will also affect related tasks and activities.
    </p>

    <form method="post">
        {% csrf_token %}

        <div class="flex justify-center gap-4">

            <!-- Cancel -->
            <a href="{% url 'dashboard:admin_module_detail' object.pk %}"
               class="px-4 py-2 border rounded hover:bg-gray-100">
               Cancel
            </a>

            <!-- Confirm Delete -->
            <button type="submit"
                    class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                Delete
            </button>

        </div>
    </form>

</div>

{% endblock %}
