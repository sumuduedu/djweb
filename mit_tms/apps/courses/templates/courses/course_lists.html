{% extends 'base.html' %}
{% load ui_components %}
{% load core_tags %}
{% block content %}

<div class="max-w-7xl mx-auto px-6 py-8">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">Courses</h1>
            <p class="text-sm text-gray-500 mt-1">
                Manage and organize your training programs
            </p>
        </div>

        {% if can_create %}
        <a href="{% url 'courses:course_create' %}" class="btn btn-add">
            + New Course
        </a>
        {% endif %}
    </div>

    <!-- SEARCH -->
    <div class="mb-5">
        <input type="text"
               placeholder="Search courses..."
               class="w-full md:w-80 px-4 py-2 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
    </div>

    <!-- TABLE COMPONENT -->
    {% render_table table %}

</div>

{% include "partials/table/styles.html" %}

{% endblock %}
