{% extends 'base.html' %}

{% block content %}
<h2>{% if object %}Edit Course{% else %}Add Course{% endif %}</h2>

<form method="post">
    {% csrf_token %}

    <p>
        <label>Title:</label><br>
        {{ form.title }}
    </p>

    <p>
        <label>Code:</label><br>
        {{ form.code }}
    </p>

    <p>
        <label>Description:</label><br>
        {{ form.description }}
    </p>

    <p>
        <label>Duration (hours):</label><br>
        {{ form.duration_hours }}
    </p>

    <p>
        <label>Level:</label><br>
        {{ form.level }}
    </p>

    <button type="submit">💾 Save</button>
</form>

<br>
<a href="{% url 'course_list' %}">⬅ Back to Courses</a>

{% endblock %}
