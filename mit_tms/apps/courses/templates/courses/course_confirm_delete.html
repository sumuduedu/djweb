{% extends 'base.html' %}

{% block content %}
<h2>Delete Course</h2>

<p>Are you sure you want to delete:</p>
<strong>{{ object.title }}</strong>

<form method="post">
    {% csrf_token %}
    <br>
    <button type="submit">✅ Yes, Delete</button>
</form>

<br>
<a href="{% url 'course_list' %}">❌ Cancel</a>

{% endblock %}
