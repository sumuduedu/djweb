{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>{% block page_title %}MIT TMS{% endblock %}</title>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Alpine -->
    <script src="https://unpkg.com/alpinejs" defer></script>

    <!-- Tailwind -->
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>

<body class="bg-gray-100 text-gray-800 antialiased">

<div x-data="layout()" class="flex h-screen overflow-hidden">

    <!-- 🔷 SIDEBAR -->

        {% include "partials/sidebar/index.html" %}
    </aside>

    <!-- 🔲 OVERLAY -->
    <div x-show="mobileOpen"
         x-transition.opacity
         @click="mobileOpen = false"
         class="fixed inset-0 bg-black/40 md:hidden z-40">
    </div>

    <!-- 🔷 MAIN -->
    <div class="flex-1 flex flex-col">

        <!-- 🔷 TOPBAR -->
        {% include "partials/topbar.html" %}

        <!-- 🔷 CONTENT -->
        <main class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4">

            {% if messages %}
                {% for message in messages %}
                    <div class="flash-message flex justify-between items-center p-3 rounded bg-green-50 text-green-700 border">
                        {{ message }}
                        <button onclick="this.parentElement.remove()">✕</button>
                    </div>
                {% endfor %}
            {% endif %}

            {% block content %}
            {% endblock %}

        </main>

    </div>

</div>

<!-- 🔧 ALPINE -->
<script>
function layout() {
    return {
        collapsed: false,
        mobileOpen: false,

        init() {
            if (window.innerWidth < 768) {
                this.collapsed = true;
            }

            const saved = localStorage.getItem('sidebarCollapsed');
            if (saved !== null) {
                this.collapsed = saved === 'true';
            }
        },

        toggleCollapse() {
            this.collapsed = !this.collapsed;
            localStorage.setItem('sidebarCollapsed', this.collapsed);
        }
    }
}
</script>

</body>
</html>
