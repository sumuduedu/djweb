{% extends 'base.html' %}

{% block page_title %}Add Module Plan{% endblock %}

{% block content %}

<div class="max-w-2xl mx-auto">

    <!-- 🔷 Card -->
    <div class="bg-white shadow rounded-xl p-6">

        <!-- Header -->
        <h2 class="text-xl font-bold mb-4 text-gray-800">
            📝 Add Module Plan
        </h2>

        <!-- 🔷 Form -->
        <form method="post" class="space-y-4">
            {% csrf_token %}

            <!-- 🔹 Module -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Module
                </label>
                {{ form.module }}
            </div>

            <!-- 🔹 Start Date -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Start Date
                </label>
                {{ form.start_date }}
            </div>

            <!-- 🔹 End Date -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    End Date
                </label>
                {{ form.end_date }}
            </div>

            <!-- 🔹 Theory Hours -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Theory Hours
                </label>
                {{ form.theory_hours }}
            </div>

            <!-- 🔹 Practical Hours -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Practical Hours
                </label>
                {{ form.practical_hours }}
            </div>

            <!-- 🔷 Buttons -->
            <div class="flex justify-between items-center pt-4">

                <!-- Cancel -->
                <a href="{% url 'batch:batch_detail' view.kwargs.batch_id %}"
                   class="text-gray-600 hover:underline">
                   ← Cancel
                </a>

                <!-- Submit -->
                <button type="submit"
                        class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition">
                    💾 Save Plan
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
