{% extends 'website/base.html' %}
{% block content %}

<section class="bg-gradient-to-r from-indigo-600 to-blue-600 text-white py-16 text-center">
    <h1 class="text-4xl font-bold">Our Blog</h1>
    <p class="mt-3 text-blue-100">Insights, tutorials & ICT knowledge</p>
</section>

<section class="max-w-7xl mx-auto px-6 py-12 grid md:grid-cols-3 gap-8">

    {% for post in posts %}
    <a href="{% url 'blog_detail' post.slug %}"
       class="bg-white rounded-2xl shadow hover:shadow-xl transition overflow-hidden">

        {% if post.cover %}
        <img src="{{ post.cover.url }}" class="w-full h-48 object-cover">
        {% endif %}

        <div class="p-6">
            <h2 class="font-bold text-lg text-gray-800">{{ post.title }}</h2>

            <p class="text-sm text-gray-500 mt-2">
                {{ post.created_at|date:"M d, Y" }}
            </p>

            <p class="text-gray-600 mt-3 line-clamp-3">
                {{ post.content|truncatewords:20 }}
            </p>

            <div class="mt-4 text-blue-600 font-semibold">
                Read More →
            </div>
        </div>
    </a>
    {% endfor %}

</section>

{% endblock %}
