{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MIT TMS Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white p-5 flex flex-col">

        <h2 class="text-2xl font-bold mb-6">MIT TMS</h2>

        <nav class="space-y-2 flex-1">

            <a href="{% url 'dashboard' %}"
               class="block px-3 py-2 rounded hover:bg-gray-700">
                📊 Dashboard
            </a>

            <a href="{% url 'course_list' %}"
               class="block px-3 py-2 rounded hover:bg-gray-700">
                📚 Courses
            </a>

        </nav>

        <!-- Logout -->
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="w-full bg-red-500 py-2 rounded hover:bg-red-600">
                Logout
            </button>
        </form>

    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col">

        <!-- Topbar -->
        <header class="bg-white shadow px-6 py-4 flex justify-between items-center">

            <h1 class="text-xl font-semibold">
                {% block page_title %}Dashboard{% endblock %}
            </h1>

            <div class="text-sm text-gray-600">
                👤 {{ request.user.username }}
            </div>

        </header>

        <!-- Content -->
        <main class="p-6">
            {% block content %}
            {% endblock %}
        </main>

    </div>

</div>

</body>
</html>
