{% extends 'base.html' %}

{% block content %}

<div class="max-w-3xl mx-auto">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">{{ object.title }}</h2>

        <div class="space-x-2">
            <a href="{% url 'course_update' object.pk %}"
               class="bg-yellow-500 text-white px-4 py-2 rounded hover:bg-yellow-600">
                ✏️ Edit
            </a>

            <a href="{% url 'course_delete' object.pk %}"
               class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                🗑 Delete
            </a>
        </div>
    </div>

    <!-- Card -->
    <div class="bg-white shadow rounded-xl p-6 space-y-4">

        <div>
            <p class="text-sm text-gray-500">Course Code</p>
            <p class="text-lg font-medium">{{ object.code }}</p>
        </div>

        <div>
            <p class="text-sm text-gray-500">Description</p>
            <p class="text-gray-700">{{ object.description }}</p>
        </div>

        <div class="grid grid-cols-2 gap-4">

            <div>
                <p class="text-sm text-gray-500">Duration</p>
                <p class="font-medium">{{ object.duration_hours }} hours</p>
            </div>

            <div>
                <p class="text-sm text-gray-500">Level</p>
                <span class="px-3 py-1 text-sm rounded bg-blue-100 text-blue-700">
                    {{ object.level }}
                </span>
            </div>

        </div>

    </div>

    <!-- Back Button -->
    <div class="mt-6">
        <a href="{% url 'course_list' %}"
           class="text-blue-600 hover:underline">
            ⬅ Back to Courses
        </a>
    </div>

</div>

{% endblock %}
