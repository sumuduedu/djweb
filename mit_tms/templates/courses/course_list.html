{% extends 'base.html' %}

{% block content %}

<div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold">Courses</h2>

    <a href="{% url 'course_create' %}"
       class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700">
        + Add Course
    </a>
</div>

<div class="bg-white rounded-xl shadow overflow-hidden">

    <table class="w-full">
        <thead class="bg-gray-50 border-b">
            <tr>
                <th class="p-4 text-left">Title</th>
                <th class="p-4 text-left">Code</th>
                <th class="p-4 text-left">Level</th>
                <th class="p-4 text-right">Actions</th>
            </tr>
        </thead>

        <tbody>
        {% for course in courses %}
            <tr class="border-b hover:bg-gray-50 transition">
                <td class="p-4 font-medium">{{ course.title }}</td>
                <td class="p-4">{{ course.code }}</td>
                <td class="p-4">
                    <span class="px-2 py-1 text-sm rounded bg-blue-100 text-blue-700">
                        {{ course.level }}
                    </span>
                </td>
                <td class="p-4 text-right space-x-2">
                    <a href="{% url 'course_detail' course.pk %}"
                       class="text-blue-600 hover:underline">View</a>

                    <a href="{% url 'course_update' course.pk %}"
                       class="text-yellow-600 hover:underline">Edit</a>

                    <a href="{% url 'course_delete' course.pk %}"
                       class="text-red-600 hover:underline">Delete</a>
                </td>
            </tr>
        {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}
