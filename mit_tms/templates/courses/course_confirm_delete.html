{% extends 'base.html' %}

{% block content %}

<div class="max-w-md mx-auto">

    <!-- Card -->
    <div class="bg-white shadow-xl rounded-xl p-6 text-center">

        <!-- Icon -->
        <div class="text-red-500 text-5xl mb-4">
            ⚠️
        </div>

        <!-- Title -->
        <h2 class="text-xl font-bold mb-2">Delete Course</h2>

        <!-- Message -->
        <p class="text-gray-600 mb-4">
            Are you sure you want to delete this course?
        </p>

        <!-- Course Name -->
        <p class="font-semibold text-gray-800 mb-6">
            "{{ object.title }}"
        </p>

        <!-- Buttons -->
        <form method="post" class="space-y-3">
            {% csrf_token %}

            <button type="submit"
                class="w-full bg-red-500 text-white py-2 rounded hover:bg-red-600">
                Yes, Delete
            </button>

            <a href="{% url 'course_list' %}"
               class="block w-full bg-gray-200 py-2 rounded hover:bg-gray-300">
                Cancel
            </a>
        </form>

    </div>

</div>

{% endblock %}
