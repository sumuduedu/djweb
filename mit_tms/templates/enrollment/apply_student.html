{% extends 'base.html' %}
{% block content %}

<div class="min-h-screen bg-gray-100 py-10 px-4">

<div class="max-w-3xl mx-auto bg-white rounded-2xl shadow p-8">

<h2 class="text-2xl font-bold mb-4">
🎓 Apply for {{ course.title }}
</h2>

<form method="post" enctype="multipart/form-data" class="space-y-5">
{% csrf_token %}

<!-- ROLE -->
<select name="role_type" id="role_type" class="input-field">
    <option value="STUDENT">Student</option>
    <option value="PARENT">Parent</option>
</select>

<!-- USER -->
<input value="{{ user.get_full_name }}" class="input-field bg-gray-100" readonly>
<input value="{{ user.email }}" class="input-field bg-gray-100" readonly>

<!-- CONTACT -->
<input name="phone" placeholder="Mobile Number" class="input-field" required>
<input name="home_phone" placeholder="Home Telephone" class="input-field">

<!-- ADDRESS -->
<textarea name="current_address" placeholder="Current Address" class="input-field" required></textarea>
<textarea name="permanent_address" placeholder="Permanent Address" class="input-field" required></textarea>

<!-- NIC -->
<input name="nic_number" placeholder="NIC Number" class="input-field">
<input type="file" name="nic_copy" class="input-field">

<!-- QUALIFICATION -->
<!-- QUALIFICATION -->
<div class="space-y-4">

<h3 class="font-semibold text-gray-700">🎓 Qualification</h3>

<!-- O/L -->
<div>
<h4 class="font-medium">📘 O/L Results</h4>

<table id="olTable" class="w-full border text-sm mt-2">
<tr class="bg-gray-100">
<th class="p-2">Subject</th>
<th class="p-2">Grade</th>
<th></th>
</tr>
</table>

<button type="button" onclick="addOLRow()" class="text-blue-600 text-sm mt-2">
+ Add O/L Subject
</button>
</div>

<!-- A/L -->
<div>
<h4 class="font-medium">📕 A/L Results</h4>

<table id="alTable" class="w-full border text-sm mt-2">
<tr class="bg-gray-100">
<th class="p-2">Subject</th>
<th class="p-2">Grade</th>
<th></th>
</tr>
</table>

<button type="button" onclick="addALRow()" class="text-blue-600 text-sm mt-2">
+ Add A/L Subject
</button>
</div>

<!-- EXTRA -->
<div class="grid md:grid-cols-3 gap-4">
<input name="english_grade" placeholder="English Grade" class="input-field">
<input name="git_grade" placeholder="GIT Grade" class="input-field">
<input name="z_score" placeholder="Z-Score" class="input-field">
</div>

</div>

<!-- PARENT SECTION -->
<div id="parentSection" class="hidden space-y-3 bg-gray-50 p-4 rounded">

<h3 class="font-semibold">👨‍👩‍👧 Parent Details</h3>

<input name="parent_name" placeholder="Parent Name" class="input-field">
<input name="parent_email" placeholder="Parent Email" class="input-field">
<input name="student_name" placeholder="Student Name" class="input-field">
<input name="student_age" type="number" placeholder="Student Age" class="input-field">
<input name="relationship" placeholder="Relationship" class="input-field">

</div>

<!-- NOTES -->
<textarea name="notes" placeholder="Additional Notes" class="input-field"></textarea>

<button class="bg-blue-600 text-white px-6 py-2 rounded">
Submit Application
</button>

</form>
</div>
</div>

<style>
.input-field {
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
}
</style>

<script>
const role = document.getElementById("role_type");
const parent = document.getElementById("parentSection");

role.addEventListener("change", () => {
    parent.classList.toggle("hidden", role.value !== "PARENT");
});
</script>

{% endblock %}
