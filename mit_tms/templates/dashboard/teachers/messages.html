{% extends 'base.html' %}
{% block content %}

<div class="p-6 bg-gray-100 min-h-screen">

    <!-- HEADER -->
    <div class="mb-6">
        <h1 class="text-3xl font-bold">💬 Messages</h1>
        <p class="text-gray-500">Communicate with students</p>
    </div>

    <div class="grid md:grid-cols-3 gap-6">

        <!-- LEFT: THREADS -->
        <div class="bg-white p-4 rounded-2xl shadow">

            <h2 class="font-semibold mb-4">Students</h2>

            {% for t in threads %}
            <div class="p-3 rounded-lg mb-2 cursor-pointer hover:bg-gray-100
                {% if t.active %} bg-blue-50 {% endif %}
            ">
                <p class="font-medium">{{ t.name }}</p>
                <p class="text-xs text-gray-500">
                    {{ t.last_message|truncatechars:30 }}
                </p>
            </div>
            {% endfor %}

        </div>

        <!-- RIGHT: CHAT -->
        <div class="md:col-span-2 bg-white p-4 rounded-2xl shadow flex flex-col">

            <!-- MESSAGES -->
            <div class="flex-1 space-y-3 overflow-y-auto mb-4">

                {% for m in messages %}
                <div class="flex
                    {% if m.sender == 'teacher' %}
                        justify-end
                    {% else %}
                        justify-start
                    {% endif %}
                ">
                    <div class="max-w-xs p-3 rounded-xl
                        {% if m.sender == 'teacher' %}
                            bg-blue-600 text-white
                        {% else %}
                            bg-gray-200 text-gray-800
                        {% endif %}
                    ">
                        <p class="text-sm">{{ m.text }}</p>
                        <p class="text-xs mt-1 opacity-70">{{ m.timestamp }}</p>
                    </div>
                </div>
                {% endfor %}

            </div>

            <!-- INPUT -->
            <form method="post" class="flex gap-2">
                {% csrf_token %}
                <input type="text" name="message"
                       class="flex-1 border rounded-lg px-3 py-2"
                       placeholder="Type a message...">
                <button class="bg-blue-600 text-white px-4 py-2 rounded">
                    Send
                </button>
            </form>

        </div>

    </div>

</div>

{% endblock %}
