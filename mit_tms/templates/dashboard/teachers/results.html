{% extends 'base.html' %}
{% block content %}

<h1 class="text-2xl font-bold mb-6">📊 Results</h1>

<table class="w-full border text-sm">
    <thead class="bg-gray-100">
        <tr>
            <th class="p-2 border">Student</th>
            <th class="p-2 border">Course</th>
            <th class="p-2 border">Score</th>
            <th class="p-2 border">Status</th>
        </tr>
    </thead>

    <tbody>
        {% for r in results %}
        <tr>
            <td class="p-2 border">{{ r.student }}</td>
            <td class="p-2 border">{{ r.course }}</td>
            <td class="p-2 border">{{ r.score }}%</td>
            <td class="p-2 border">
                {% if r.status == 'PASS' %}
                    <span class="text-green-600">PASS</span>
                {% else %}
                    <span class="text-red-600">FAIL</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
