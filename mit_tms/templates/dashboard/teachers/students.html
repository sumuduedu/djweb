{% extends 'base.html' %}
{% block content %}

<h1 class="text-2xl font-bold mb-4">👨‍🎓 Students</h1>

<table class="w-full border">
    <tr>
        <th>Name</th>
        <th>Course</th>
        <th>Attendance</th>
        <th>Status</th>
    </tr>

    {% for s in students %}
    <tr>
        <td>{{ s.name }}</td>
        <td>{{ s.course }}</td>
        <td>{{ s.attendance }}%</td>
        <td>{{ s.status }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
