{% extends 'base.html' %}
{% block content %}

<h1 class="text-2xl font-bold mb-4">📝 Assignments</h1>

{% for a in assignments %}
<div class="bg-white p-4 rounded shadow mb-3">
    <h2 class="font-semibold">{{ a.title }}</h2>
    <p>{{ a.course }} | Due: {{ a.due_date }}</p>
</div>
{% endfor %}

{% endblock %}
