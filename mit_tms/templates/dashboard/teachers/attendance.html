{% extends 'base.html' %}
{% block content %}

<h1 class="text-2xl font-bold mb-6">📅 Attendance</h1>

<table class="w-full border text-sm">
    <thead class="bg-gray-100">
        <tr>
            <th class="p-2 border">Student</th>
            <th class="p-2 border">Course</th>
            <th class="p-2 border">Batch</th>
            <th class="p-2 border">Attendance</th>
        </tr>
    </thead>

    <tbody>
        {% for a in attendance %}
        <tr>
            <td class="p-2 border">{{ a.student }}</td>
            <td class="p-2 border">{{ a.course }}</td>
            <td class="p-2 border">{{ a.batch }}</td>
            <td class="p-2 border">{{ a.attendance }}%</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
