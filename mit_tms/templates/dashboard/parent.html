{% extends 'base.html' %}

{% block content %}

<div class="p-6 bg-gray-100 min-h-screen">

    <h1 class="text-2xl font-bold mb-6">👨‍👩‍👧 Parent Dashboard</h1>

    <div class="bg-white p-6 rounded-2xl shadow">

        <h2 class="text-xl font-semibold mb-4">Child Info</h2>

        {% if parent %}
            <p><strong>Student:</strong> {{ parent.student.full_name }}</p>
            <p><strong>Relationship:</strong> {{ parent.relationship }}</p>
        {% else %}
            <p>No linked student</p>
        {% endif %}

    </div>

</div>

{% endblock %}
