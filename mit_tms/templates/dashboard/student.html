{% extends 'base.html' %}

{% block content %}

<div class="p-6 bg-gray-100 min-h-screen">

    <h1 class="text-2xl font-bold mb-6">🎓 Student Dashboard</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

        <div class="bg-white p-5 rounded-2xl shadow">
            <h3 class="text-gray-500">My Courses</h3>
            <p class="text-2xl font-bold text-blue-600">3</p>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow">
            <h3 class="text-gray-500">Completed Tasks</h3>
            <p class="text-2xl font-bold text-green-600">15</p>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow">
            <h3 class="text-gray-500">Performance</h3>
            <p class="text-2xl font-bold text-purple-600">Good</p>
        </div>

    </div>

    <div class="bg-white p-6 rounded-2xl shadow mt-6">
        <h2 class="text-xl font-semibold mb-4">My Profile</h2>

        <p><strong>Name:</strong> {{ student.full_name }}</p>
        <p><strong>Email:</strong> {{ request.user.email }}</p>
    </div>

</div>

{% endblock %}
