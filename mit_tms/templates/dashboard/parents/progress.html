{% extends 'base.html' %}
{% block content %}

<div class="p-6 bg-gray-100 min-h-screen">

    <h1 class="text-3xl font-bold mb-6">📊 Children Progress</h1>

    <div class="bg-white p-6 rounded-2xl shadow">

        <table class="w-full text-sm border">
            <thead class="bg-gray-50">
                <tr>
                    <th class="p-3 border">Student</th>
                    <th class="p-3 border">Course</th>
                    <th class="p-3 border">Attendance</th>
                    <th class="p-3 border">Avg Score</th>
                    <th class="p-3 border">Status</th>
                </tr>
            </thead>

            <tbody>
                {% for p in progress %}
                <tr>
                    <td class="p-3 border">{{ p.student }}</td>
                    <td class="p-3 border">{{ p.course }}</td>
                    <td class="p-3 border">{{ p.attendance }}%</td>
                    <td class="p-3 border">{{ p.avg_score }}%</td>
                    <td class="p-3 border">
                        <span class="text-xs px-2 py-1 rounded
                            {% if p.status == 'GOOD' %}
                                bg-green-100 text-green-700
                            {% else %}
                                bg-red-100 text-red-700
                            {% endif %}
                        ">
                            {{ p.status }}
                        </span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</div>

{% endblock %}
