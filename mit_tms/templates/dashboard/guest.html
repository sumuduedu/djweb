{% extends 'base.html' %}

{% block content %}

<div class="p-6 bg-gray-100 min-h-screen text-center">

    <h1 class="text-2xl font-bold mb-6">👤 Welcome Guest</h1>

    <div class="bg-white p-6 rounded-2xl shadow max-w-3xl mx-auto">

        <p class="text-gray-600 mb-6">
            You are not enrolled in any courses yet.
        </p>

        <!-- 🔥 COURSE LIST -->
        {% if courses %}
            <h2 class="text-lg font-semibold mb-4">Available Courses</h2>

            {% for course in courses %}
                <div class="border p-4 rounded-lg mb-4 text-left">

                    <h3 class="font-bold text-lg">{{ course.title }}</h3>

                    <div class="mt-3 flex gap-2">

                        <a href="{% url 'core:apply_student' course.id %}"
                           class="bg-green-600 text-white px-3 py-1 rounded">
                            Apply as Student
                        </a>



                        <a href="{% url 'core:apply_parent' course.id %}"
                           class="bg-yellow-600 text-white px-3 py-1 rounded">
                            Apply as Parent
                        </a>

                    </div>

                </div>
            {% endfor %}

        {% else %}
            <p>No courses available.</p>
        {% endif %}

    </div>

</div>

{% endblock %}
