{% for section in admin_menu %}

<div x-data="{ open: true }" class="space-y-1">

    <!-- SECTION TITLE -->
    <button @click="open = !open"
        class="w-full flex items-center justify-between px-3 py-2 text-xs uppercase text-gray-400 hover:text-white">

        <span class="menu-text">{{ section.section }}</span>
        <span class="menu-text transition-transform"
              :class="{ 'rotate-180': open }">▾</span>
    </button>

    <!-- LINKS -->
    <div x-show="open" x-transition class="space-y-1">

        {% for item in section.items %}

        {% url item.url as the_url %}

        <a href="{{ the_url }}"
           class="nav-link group relative flex items-center gap-3 px-3 py-2 rounded-lg
                  transition hover:bg-gray-800
                  {% if request.resolver_match.url_name == item.url|cut:'core:' %}
                      bg-gray-800 text-white
                  {% endif %}">

            <!-- ICON -->
            <span class="icon text-lg">{{ item.icon }}</span>

            <!-- TEXT -->
            <span class="menu-text">{{ item.name }}</span>

            <!-- BADGE -->
            {% if item.badge == "notifications" %}
                <span class="ml-auto bg-red-500 text-xs px-2 rounded menu-text">
                    {{ notification_count }}
                </span>
            {% elif item.badge == "risk" %}
                <span class="ml-auto bg-yellow-500 text-xs px-2 rounded menu-text">
                    {{ risk_count }}
                </span>
            {% endif %}

            <!-- TOOLTIP -->
            <span x-show="$root.collapsed"
                  class="sidebar-tooltip absolute left-full ml-2 px-2 py-1 text-xs bg-black text-white rounded whitespace-nowrap">
                {{ item.name }}
            </span>

        </a>

        {% endfor %}

    </div>

</div>

{% endfor %}
