<a href="{{ url }}"
   class="nav-link group relative flex items-center gap-3 px-3 py-2 rounded-lg
          transition-all duration-200 hover:bg-gray-800"
   :class="$store.sidebar.collapsed ? 'justify-center gap-0' : ''">

    <!-- ICON -->
    <span class="icon text-lg flex-shrink-0">{{ icon }}</span>

    <!-- TEXT -->
    <span x-show="!$store.sidebar.collapsed"
          x-transition:leave="transition-opacity duration-100"
          x-transition:leave-start="opacity-100"
          x-transition:leave-end="opacity-0"
          class="menu-text whitespace-nowrap overflow-hidden">
        {{ label }}
    </span>

    <!-- BADGE -->
    {% if badge %}
    <span x-show="!$store.sidebar.collapsed"
          class="ml-auto bg-red-500 text-xs px-2 rounded text-white">
        {{ badge }}
    </span>
    {% endif %}

    <!-- TOOLTIP (only when collapsed) -->
    <span x-show="$store.sidebar.collapsed"
          class="sidebar-tooltip">
        {{ label }}
    </span>
</a>
