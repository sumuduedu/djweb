<div x-data="{ open: true }">

    <button @click="open = !open"
        class="w-full flex items-center px-3 py-2 text-xs uppercase text-gray-500 hover:text-white transition-all duration-300"
        :class="collapsed ? 'justify-center' : 'justify-between'">

        <div x-show="!collapsed"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             x-transition:leave="transition ease-in duration-100"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="section-title overflow-hidden whitespace-nowrap font-bold">
            {{ title }}
        </div>

        <span x-show="!collapsed"
              class="transition-transform duration-200"
              :class="open ? 'rotate-0' : '-rotate-90'">
            ▾
        </span>

        <div x-show="collapsed" class="h-px w-4 bg-gray-700"></div>

    </button>

    <div x-show="open && !collapsed"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         class="space-y-1">

        {% for item in items %}
            {% include "partials/sidebar/components/link.html" with url=item.url label=item.name icon=item.icon active=item.url badge=item.badge|default:'' %}
        {% endfor %}
    </div>

    <div x-show="collapsed" class="flex flex-col items-center space-y-2 mt-2">
        {% for item in items %}
             <a href="{{ item.url }}" class="text-gray-400 hover:text-white text-lg">
                 {{ item.icon }}
             </a>
        {% endfor %}
    </div>

</div>
