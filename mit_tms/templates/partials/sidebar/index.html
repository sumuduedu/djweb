{% for section in sidebar_items %}

<div x-data="{ open: !collapsed }">

    <!-- SECTION TITLE -->
    <button @click="open = !open"
        class="w-full flex items-center justify-between px-3 py-2 text-xs uppercase text-gray-400 hover:text-white">

        <!-- TEXT -->
        <span x-show="!collapsed" x-transition>
            {{ section.section }}
        </span>

        <!-- ARROW -->
        <span x-show="!collapsed"
              class="transition-transform duration-200"
              :class="{ 'rotate-180': open }">
            ▾
        </span>
    </button>

    <!-- LINKS -->
    <div x-show="open" x-transition class="space-y-1">

        {% for item in section.items %}

        <a href="{% url item.url %}"
           class="nav-link group relative flex items-center px-3 py-2 rounded-lg
                  transition hover:bg-gray-800
                  {% if request.resolver_match.view_name == item.url %}
                      bg-gray-800 text-white
                  {% endif %}"
           :class="collapsed ? 'justify-center' : 'gap-3'">

            <!-- ICON -->
            <span class="transition-all duration-200"
                  :class="collapsed ? 'text-2xl mx-auto' : 'text-lg'">
                {{ item.icon }}
            </span>

            <!-- TEXT -->
            <span x-show="!collapsed" x-transition>
                {{ item.name }}
            </span>

            <!-- BADGE -->
            {% if item.badge == "notifications" %}
                <span x-show="!collapsed"
                      class="ml-auto bg-red-500 text-xs px-2 rounded">
                    {{ notification_count }}
                </span>
            {% elif item.badge == "risk" %}
                <span x-show="!collapsed"
                      class="ml-auto bg-yellow-500 text-xs px-2 rounded">
                    {{ risk_count }}
                </span>
            {% endif %}

            <!-- TOOLTIP (when collapsed) -->
            <span x-show="collapsed"
                  class="absolute left-16 bg-gray-800 text-white text-xs px-2 py-1 rounded
                         opacity-0 group-hover:opacity-100 whitespace-nowrap z-50">
                {{ item.name }}
            </span>

        </a>

        {% endfor %}

    </div>

</div>

{% endfor %}
