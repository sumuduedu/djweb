<aside id="sidebar"
       class="w-64 bg-gray-900 text-white flex flex-col transition-all duration-300">

    <!-- LOGO -->
    <div class="p-5 border-b border-gray-800">
        <h2 id="logoText" class="text-xl font-bold tracking-wide">
            MIT TMS
        </h2>
    </div>

    <!-- NAV -->
    <nav class="flex-1 px-3 py-4 space-y-1 text-sm">



        <!-- ================= ADMIN ================= -->
        {% if is_admin %}
      <!-- ================= MAIN ================= -->
        <p class="section-title px-3 text-xs text-gray-400 uppercase mb-2">
            Main
        </p>

        <!-- ALL USERS -->
        <a href="{% url 'core:admin_dashboard' %}" class="nav-link">
            <span class="icon text-lg">📊</span>
            <span class="menu-text">Dashboard</span>
        </a>


        <!-- FULL ACCESS (YOUR ORIGINAL MENU) -->

        <a href="{% url 'course_list' %}" class="nav-link">
            <span class="icon text-lg">📚</span>
            <span class="menu-text">Courses</span>
        </a>

        <a href="{% url 'batch:batch_list' %}" class="nav-link">
            <span class="icon text-lg">📦</span>
            <span class="menu-text">Batches</span>
        </a>

        <p class="section-title px-3 text-xs text-gray-400 uppercase mt-4 mb-2">
            Planning
        </p>

        <a href="{% url 'schedule:calendar' %}" class="nav-link">
            <span class="icon text-lg">📅</span>
            <span class="menu-text">Calendar</span>
        </a>

        <a href="{% url 'schedule:timetable_list' %}" class="nav-link">
            <span class="icon text-lg">📅</span>
            <span class="menu-text">Timetable</span>
        </a>

        <p class="section-title px-3 text-xs text-gray-400 uppercase mt-4 mb-2">
            User Management
        </p>

        <a href="{% url 'accounts:user_list' %}" class="nav-link">
            <span class="icon text-lg">👤</span>
            <span class="menu-text">Users</span>
        </a>

        {% endif %}


        <!-- ================= TEACHER ================= -->
        {% if is_teacher %}

        <p class="section-title px-3 text-xs text-gray-400 uppercase mt-4 mb-2">
            Teaching
        </p>

        <a href="{% url 'course_list' %}" class="nav-link">
            <span class="icon text-lg">📚</span>
            <span class="menu-text">Courses</span>
        </a>

        <a href="{% url 'batch:batch_list' %}" class="nav-link">
            <span class="icon text-lg">📦</span>
            <span class="menu-text">Batches</span>
        </a>

        <a href="{% url 'schedule:timetable_list' %}" class="nav-link">
            <span class="icon text-lg">📅</span>
            <span class="menu-text">Timetable</span>
        </a>

        {% endif %}


        <!-- ================= STUDENT ================= -->
        {% if is_student %}

        <p class="section-title px-3 text-xs text-gray-400 uppercase mt-4 mb-2">
            Student
        </p>

        <a href="{% url 'core:student_courses' %}" class="nav-link">
            <span class="icon text-lg">📚</span>
            <span class="menu-text">My Courses</span>
        </a>

        <a href="{% url 'core:student_attendance' %}" class="nav-link">
            <span class="icon text-lg">📅</span>
            <span class="menu-text">Attendance</span>
        </a>

        {% endif %}

    </nav>

</aside>


<!-- ================= STYLE ================= -->
<style>
.nav-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    transition: 0.2s;
}

.nav-link:hover {
    background: #1f2937;
}

.section-title {
    letter-spacing: 0.05em;
}

/* COLLAPSED MODE */
.sidebar-collapsed .menu-text,
.sidebar-collapsed .section-title {
    display: none;
}

.sidebar-collapsed .nav-link {
    justify-content: center;
}

.icon {
    font-size: 18px;
}

.sidebar-collapsed .icon {
    font-size: 22px;
}
</style>


<!-- ================= SCRIPT ================= -->
<script>
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');

    sidebar.classList.toggle('w-20');
    sidebar.classList.toggle('w-64');
    sidebar.classList.toggle('sidebar-collapsed');
}
</script>
