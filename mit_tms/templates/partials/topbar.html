<header class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center">

    <!-- 🔷 LEFT -->
    <div class="flex items-center gap-4">

        <!-- Sidebar Toggle -->
        <button onclick="toggleSidebar()"
                class="text-xl text-gray-600 hover:text-black">
            ☰
        </button>

        <!-- Page Title -->
        <h1 class="text-lg font-semibold text-gray-800">
            {% block header %}Dashboard{% endblock %}
        </h1>

    </div>

    <!-- 🔷 RIGHT (USER MENU) -->
    <div class="relative">

        <!-- USER BUTTON -->
        <button onclick="toggleUserMenu()"
                class="flex items-center gap-3 text-sm text-gray-700 hover:text-black">

            <!-- 🔥 PROFILE IMAGE / FALLBACK -->
            <div class="w-9 h-9 rounded-full overflow-hidden border border-gray-300 bg-gray-200">

                {% if request.user.profile.image %}
                    <img src="{{ request.user.profile.image.url }}"
                         class="w-full h-full object-cover">
                {% else %}
                    <div class="w-full h-full flex items-center justify-center text-sm font-bold text-gray-600">
                        {{ request.user.username|slice:":1"|upper }}
                    </div>
                {% endif %}

            </div>

            <!-- Username -->
            <span class="hidden md:block font-medium">
                {{ request.user.username }}
            </span>

        </button>

        <!-- 🔷 DROPDOWN -->
        <div id="userMenu"
             class="hidden absolute right-0 mt-3 w-56 bg-white rounded-xl shadow-lg border z-50">

            <!-- User Info -->
            <div class="px-4 py-3 border-b">
                <p class="text-sm font-medium text-gray-800">
                    {{ request.user.username }}
                </p>
                <p class="text-xs text-gray-500">
                    {{ request.user.email }}
                </p>
            </div>

            <!-- Links -->
            <a href="{% url 'accounts:profile' %}" class="dropdown-link">
                👤 Profile
            </a>

            <a href="{% url 'accounts:account_settings' %}" class="dropdown-link">
                ⚙️ Settings
            </a>

                {% if request.user.is_staff %}
                    <a href="/admin/" class="dropdown-link">
                        🛠 Admin Panel
                    </a>
                {% endif %}
            <!-- Logout -->
<form method="post" action="{% url 'logout' %}" class="inline">
    {% csrf_token %}
<button type="submit"
    class="w-full text-left px-4 py-2 text-red-500 hover:bg-gray-100 rounded transition">
    🚪 Logout
</button>
</form>
        </div>

    </div>

</header>


<!-- 🔷 STYLES -->
<style>
.dropdown-link {
    display: block;
    padding: 10px 16px;
    font-size: 14px;
    transition: 0.2s;
}
.dropdown-link:hover {
    background: #f3f4f6;
}
</style>


<!-- 🔷 SCRIPT -->
<script>
function toggleUserMenu() {
    const menu = document.getElementById('userMenu');
    menu.classList.toggle('hidden');
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
    const menu = document.getElementById('userMenu');

    if (!e.target.closest('#userMenu') && !e.target.closest('[onclick="toggleUserMenu()"]')) {
        menu.classList.add('hidden');
    }
});
</script>
