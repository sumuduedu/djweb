<section class="relative text-white py-32 text-center overflow-hidden">

    <!-- Smooth Premium Gradient -->
    <div class="absolute inset-0 bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600"></div>

    <!-- Soft Light Overlay -->
    <div class="absolute inset-0 bg-white/5 backdrop-blur-sm"></div>

    <!-- Content -->
    <div class="relative max-w-4xl mx-auto px-6">

        <!-- Title -->
        <h1 class="font-extrabold leading-tight text-center">

            <span class="block text-[clamp(2.5rem,5vw,4rem)]">
                {{ title_prefix }}
                <span class="text-yellow-300">
                    {{ title_highlight }}
                </span>
            </span>

        </h1>

        <!-- Description -->
        <p class="mt-6 text-lg md:text-xl text-blue-100 max-w-2xl mx-auto leading-relaxed">
            {{ description }}
        </p>

        <!-- Buttons -->
        <div class="mt-10 flex justify-center gap-4 flex-wrap">

            {% if button_text %}
            <a href="{{ button_link }}"
               class="px-8 py-3 bg-white text-blue-700 font-semibold rounded-xl shadow-md hover:shadow-lg hover:scale-105 transition">
                {{ button_text }}
            </a>
            {% endif %}

            <a href="#about"
               class="px-8 py-3 border border-white/70 rounded-xl text-white hover:bg-white hover:text-blue-700 transition">
                Learn More
            </a>

        </div>

    </div>
</section>
