<div class="rounded-xl p-5 shadow cursor-pointer
            {% if clickable %}hover:shadow-lg transition{% endif %}
            {{ bg_color|default:'bg-white' }}">

    {% if clickable and url %}
    <a href="{{ url }}">
    {% endif %}

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-2">
        <h3 class="text-sm {{ text_color|default:'text-gray-500' }}">
            {{ title }}
        </h3>

        {% if icon %}
            <span class="text-xl">{{ icon }}</span>
        {% endif %}
    </div>

    <!-- VALUE -->
    <div class="text-2xl font-bold {{ value_color|default:'text-gray-800' }}">
        {{ value }}
    </div>

    <!-- SUBTEXT -->
    {% if subtitle %}
        <div class="text-xs text-gray-400 mt-1">
            {{ subtitle }}
        </div>
    {% endif %}

    <!-- EXTRA -->
    {% if extra %}
        <div class="mt-3 text-sm">
            {{ extra }}
        </div>
    {% endif %}

    {% if clickable and url %}
    </a>
    {% endif %}

</div>
