{% extends 'base.html' %}

{% block content %}

<div class="max-w-7xl mx-auto space-y-6"
     x-data="timetable()">

    <!-- HEADER -->
    <div class="flex justify-between items-center">
        <h2 class="text-2xl font-bold">{{ batch.name }}</h2>
    </div>

    <!-- MODULES -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">

        {% for module in modules %}
        <div class="bg-blue-500 text-white p-2 rounded cursor-move"
             draggable="true"
             @dragstart="setModule($event)"
             data-id="{{ module.id }}"
             data-type="THEORY">

            {{ module.title }}
        </div>
        {% endfor %}

    </div>

    <!-- TIMETABLE GRID -->
    <div id="timetable"
         hx-get="{% url 'batch:load_timetable' %}?batch={{ batch.id }}"
         hx-trigger="load"
         hx-target="#timetable"
         hx-swap="innerHTML">

        <!-- HTMX will load here -->

    </div>

</div>

<script>
function timetable() {
    return {
        moduleId: null,
        type: null,

        setModule(e) {
            this.moduleId = e.target.dataset.id;
            this.type = e.target.dataset.type;
        },

        drop(e, el) {

            const data = {
                module: this.moduleId,
                session_type: this.type,
                batch: {{ batch.id }},
                week: {{ current_week|default:1 }},
                day: el.dataset.day,
                slot: el.dataset.slot
            };

            el.setAttribute('hx-vals', JSON.stringify(data));
            htmx.trigger(el, 'saveEvent');
        }
    }
}
</script>

{% endblock %}
