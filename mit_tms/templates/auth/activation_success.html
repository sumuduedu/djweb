{% extends 'auth/base.html' %}

{% block title %}Account Activated | MIT{% endblock %}

{% block content %}

<div class="min-h-screen grid place-items-center bg-gradient-to-br from-gray-100 to-gray-200 px-4">

    <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8 text-center">

        <!-- Success Icon -->
        <div class="mb-4">
            <div class="w-14 h-14 mx-auto flex items-center justify-center rounded-full bg-green-100">
                <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" stroke-width="2"
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
        </div>

        <!-- Title -->
        <h2 class="text-2xl font-bold text-gray-900 mb-2">
            Account Activated
        </h2>

        <!-- Message -->
        <p class="text-sm text-gray-600">
            Your account has been successfully activated.
        </p>

        <p class="text-sm text-gray-500 mt-2">
            You can now log in and start using the system.
        </p>

        <!-- Button -->
        <div class="mt-6">
            <a href="{% url 'login' %}"
               class="inline-block px-6 py-2.5 bg-blue-600 text-white rounded-lg shadow-sm hover:bg-blue-700 transition">
                Go to Login
            </a>
        </div>

    </div>
</div>

{% endblock %}
