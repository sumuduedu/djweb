{% extends "base.html" %}

{% block header %}Account Settings{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto">

    <div class="bg-white rounded-xl shadow-sm border p-6">

        <!-- 🔷 TITLE -->
        <h2 class="text-lg font-semibold text-gray-800 mb-6">
            Update Your Account
        </h2>

        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            <!-- 🔥 PROFILE IMAGE -->
            <div class="flex items-center gap-4">

                <div class="w-16 h-16 rounded-full overflow-hidden bg-gray-200 border">

                    {% if request.user.profile.image %}
                        <img src="{{ request.user.profile.image.url }}"
                             class="w-full h-full object-cover">
                    {% else %}
                        <div class="w-full h-full flex items-center justify-center text-xl font-bold text-gray-600">
                            {{ request.user.username|slice:":1"|upper }}
                        </div>
                    {% endif %}

                </div>

                <div>
                    <label class="block text-sm text-gray-600 mb-1">
                        Profile Image
                    </label>

                    <input type="file" name="image"
                           class="text-sm text-gray-600">
                </div>

            </div>

            <!-- 🔷 USERNAME -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    Username
                </label>

                <input type="text" name="username"
                       value="{{ request.user.username }}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <!-- 🔷 EMAIL -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    Email
                </label>

                <input type="email" name="email"
                       value="{{ request.user.email }}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <!-- 🔷 PASSWORD -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    New Password
                </label>

                <input type="password" name="password"
                       placeholder="Leave blank to keep current password"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <!-- 🔷 ACTION BUTTON -->
            <div class="flex justify-end">
                <button type="submit"
                        class="bg-indigo-600 text-white px-5 py-2 rounded-lg hover:bg-indigo-700 transition">
                    Save Changes
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
